<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOUKANG | 黃柔剛服裝修造工作室</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FDFBF7;
            --main-nude: #D6C0B3;
            --text-main: #4A403A;
            --text-muted: #8C8279;
            --line-light: rgba(74, 64, 58, 0.08);
            --white: #FFFFFF;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0;
            line-height: 1.8;
            letter-spacing: 0.03em;
            font-weight: 300;
        }

        h1, h2, h3, .serif {
            font-family: 'Noto Serif TC', serif;
            font-weight: 500;
            letter-spacing: 0.15em;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: rgba(253, 251, 247, 0.98);
            border-bottom: 1px solid var(--line-light);
        }

        .brand-header {
            text-align: center;
            padding: 25px 0 10px;
        }

        .brand-header h1 {
            font-size: 1.2rem;
            margin: 0;
            text-transform: uppercase;
        }

        .nav-tabs {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 10px 20px 15px;
            scrollbar-width: none;
            justify-content: flex-start;
        }
        .nav-tabs::-webkit-scrollbar { display: none; }

        .nav-tabs a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-right: 25px;
            padding-bottom: 5px;
            border-bottom: 1.5px solid transparent;
            transition: all 0.3s ease;
        }

        .nav-tabs a.active {
            color: var(--text-main);
            border-bottom-color: var(--main-nude);
            font-weight: 500;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: var(--white);
            border-radius: 4px;
            padding: 35px 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(74, 64, 58, 0.03);
            border: 1px solid rgba(214, 192, 179, 0.15);
        }

        section { scroll-margin-top: 130px; }

        .section-tag {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--main-nude);
            display: block;
            margin-bottom: 8px;
            letter-spacing: 0.2em;
        }

        .section-title {
            font-size: 1.2rem;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--line-light);
            padding-bottom: 15px;
        }

        .price-item {
